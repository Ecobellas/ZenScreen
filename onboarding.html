<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZenScreen Onboarding</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#edc95e",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1a1814", /* slightly darker than #211d11 to match 'pure black' feel while keeping warmth */
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col antialiased selection:bg-primary selection:text-background-dark">
<div class="relative flex h-full min-h-screen w-full flex-col justify-between overflow-hidden">
<!-- Header / Nav Area -->
<div class="flex w-full items-center justify-between px-6 py-8">
<span aria-hidden="true" class="material-symbols-outlined text-primary text-2xl">spa</span>
<button class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">Skip</button>
</div>
<!-- Main Content Area -->
<div class="flex flex-col items-center flex-1 justify-center w-full max-w-md mx-auto px-6">
<!-- Illustration Area -->
<div class="w-full aspect-square relative mb-8 flex items-center justify-center">
<div class="absolute inset-0 bg-gradient-to-b from-primary/10 to-transparent rounded-full blur-3xl opacity-30"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-contain" data-alt="Minimalist geometric illustration representing balance and focus" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD54ga2fuMPc4_BU4Byr3oCTxuqTwZeFDevOlwKQuD8q6y_ANBQk7OhOouIFQZnwQnd7jN9lI1lbiLR4EseX4clQSmO88eQBgI4EkzoPMsIFl3JsAI8gCg0gGfhgaXEZzpQoAI7KxmrWKnmpY26nMu4XiCvtL6us8cyHFL1DWRnPygANKvA7aBzX7dajZJDfR8qsXgTvPIitG_bUoYYMUmQjZpeJ0KS4-BXjV0GlsxNHj4eo5_YXIywOaICNHHXA_gBx4vcm164cOWN');"></div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4">
<h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-white leading-[1.1]">
                    Reclaim Your <br/><span class="text-primary">Time</span>
</h1>
<p class="text-lg font-normal text-slate-600 dark:text-slate-400 leading-relaxed max-w-[280px] mx-auto">
                    Master your digital habits with conscious design.
                </p>
</div>
</div>
<!-- Bottom Actions -->
<div class="w-full flex flex-col items-center gap-8 pb-10 pt-4 px-6 max-w-md mx-auto">
<!-- Page Indicators -->
<div class="flex flex-row items-center justify-center gap-3">
<div class="h-2 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700/50"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700/50"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700/50"></div>
</div>
<!-- CTA Button -->
<button class="group relative w-full overflow-hidden rounded-xl bg-primary h-14 px-8 transition-all hover:bg-[#dcb953] active:scale-[0.98]">
<div class="relative flex items-center justify-center gap-2">
<span class="text-background-dark text-lg font-bold tracking-wide">Get Started</span>
<span class="material-symbols-outlined text-background-dark text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</div>
</button>
</div>
</div>
