<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZenScreen Friction Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom thin stroke circle logic using gradients */
        .countdown-circle {
            background: conic-gradient(#ffffff 10%, #283039 10% 100%);
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-background-dark text-slate-100">
<!-- Top Header (Minimalist) -->
<div class="absolute top-0 left-0 w-full flex items-center justify-between p-6 z-20">
<div class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
<span class="text-sm font-medium tracking-wide">Cancel</span>
</div>
<div class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors cursor-pointer">
<span class="text-sm font-medium tracking-wide">Help</span>
<span class="material-symbols-outlined text-2xl">help_outline</span>
</div>
</div>
<!-- Center Content: Timer & Quote -->
<div class="flex-1 flex flex-col items-center justify-center w-full px-6 gap-12 z-10">
<!-- Circular Countdown Timer -->
<div class="relative flex items-center justify-center w-64 h-64">
<!-- Outer subtle ring -->
<div class="absolute inset-0 rounded-full border border-slate-800"></div>
<!-- Active Progress Ring (Simulated with SVG for cleaner lines than CSS conic-gradient for thin strokes) -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="#283039" stroke-width="1"></circle>
<circle cx="50" cy="50" fill="none" r="48" stroke="white" stroke-dasharray="301.59" stroke-dashoffset="60" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
<!-- Timer Text -->
<div class="flex flex-col items-center justify-center">
<h1 class="text-8xl font-light tracking-tighter text-white">5<span class="text-4xl ml-1 text-slate-500">s</span></h1>
</div>
</div>
<!-- Motivational Text -->
<div class="flex flex-col gap-3 text-center max-w-sm">
<div class="flex items-center justify-center gap-2 text-primary">
<span class="material-symbols-outlined text-lg">spa</span>
<span class="text-xs uppercase tracking-[0.2em] font-bold">Mindful Pause</span>
</div>
<h2 class="text-2xl md:text-3xl font-light leading-snug tracking-tight text-slate-100">
                    Is this app truly <br/>
<span class="text-slate-500 italic font-normal">necessary</span> right now?
                </h2>
<p class="text-slate-400 text-sm mt-2 leading-relaxed">
                    Take a breath. Reclaim your focus.
                </p>
</div>
</div>
<!-- Bottom Actions -->
<div class="w-full p-6 pb-12 z-20">
<div class="flex flex-col gap-4">
<!-- Primary Action: Give Up (Wait) -->
<button class="flex items-center justify-center w-full h-14 rounded-lg bg-white hover:bg-slate-200 text-black font-bold text-lg tracking-tight transition-all">
                    I'll wait
                </button>
<!-- Secondary Action: Open Anyway -->
<button class="flex items-center justify-center w-full h-14 rounded-lg border border-slate-700 hover:border-slate-500 hover:bg-slate-800/50 text-slate-300 font-medium text-base tracking-wide transition-all">
                    Open anyway
                </button>
</div>
<p class="text-center text-xs text-slate-600 mt-6 tracking-wide">
                ZenScreen • Focus Mode Active
            </p>
</div>
<!-- Background Gradient Mesh (Subtle) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[128px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-slate-700/20 rounded-full blur-[96px]"></div>
</div>
</div>
</body></html>
